
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>йШњиЊЙзњїиѓС</title>
<style>
body{margin:0;font-family:Arial;display:grid;grid-template-columns:240px 1fr 360px;height:100vh}
#left{background:#f3f4f6;padding:10px}
#mid{position:relative}
#right{background:#fafafa;padding:10px;overflow:auto}
webview{width:100%;height:100%}
button{width:100%;padding:8px;margin:5px 0}
textarea{width:100%;height:120px}
.msg{padding:8px;border-bottom:1px solid #ddd}
.small{color:#666;font-size:12px}
</style>
</head>
<body>

<div id="left">
<h3>йШњиЊЙзњїиѓС</h3>
</div>

<div id="mid">
<div id="view"></div>
</div>

<div id="right">
<h3>зњїиѓС</h3>
<textarea id="input"></textarea>
<button onclick="translate()">зњїиѓС</button>
<div id="out"></div>
</div>

<script>
async function translate(){
let t=input.value;
let r=await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q="+encodeURIComponent(t));
let d=await r.json();
out.innerText=d[0].map(x=>x[0]).join("");
}
</script>
</body>
</html>
