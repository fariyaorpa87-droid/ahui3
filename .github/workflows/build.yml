name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx electron-builder --win --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Ahui-Translator-EXE
          path: |
            dist/*.exe
            release/*.exe
